name: Hierarchy Automation

on:
  issues:
    types: [closed]

permissions:
  issues: write
  contents: read
  projects: write

jobs:
  hierarchy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const issueNum = context.payload.issue.number;
            const {owner, repo} = context.repo;

            // 1️⃣ Find open child issues linked in the body
            const searchRes = await github.rest.search.issuesAndPullRequests({
              q: `repo:${owner}/${repo} type:issue state:open "#${issueNum}"`
            });

            const openChildren = searchRes.data.items;

            // 2️⃣ If children are open → stop
            if (openChildren.length > 0) {
              console.log(`Issue #${issueNum} has open children. Nothing to do.`);
              return;
            }

            // 3️⃣ Fetch issue body to check for L1
            const {data: issue} = await github.rest.issues.get({
              owner, repo, issue_number: issueNum
            });

            const body = issue.body || "";
            const isL1 = body.includes("#level1"); // mark L1 in body

            if (isL1) {
              console.log(`All L2 done → Move L1 #${issueNum} to 'Testing' in Projects v2`);

              // Example GraphQL mutation to move item to "Testing"
              const query = `
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: String!) {
                  updateProjectV2ItemField(input: {
                    projectId: $projectId,
                    itemId: $itemId,
                    fieldId: $fieldId,
                    value: {singleSelectOptionId: $value}
                  }) { projectV2Item { id } }
                }
              `;

              // Replace with your Project ID, Item ID, and Field ID
              // You can fetch these dynamically if needed
              await github.graphql(query, {
                projectId: process.env.PROJECT_ID,
                itemId: process.env.ITEM_ID,
                fieldId: process.env.STATUS_FIELD_ID,
                value: process.env.TESTING_OPTION_ID
              });
            } else {
              // 4️⃣ Close L2 or L3
              await github.rest.issues.update({
                owner, repo, issue_number: issueNum, state: "closed"
              });
              console.log(`Closed issue #${issueNum}`);
            }
